  .person-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .person-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .stats { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    .wtitle { font-size: 13px; }

</style>

      {text:'Domain randomization sim-to-real (arXiv 2022)',url:'https://arxiv.org/abs/2208.04171',note:'86% mAP zero-shot. Argumento mais forte para dados sintéticos.'},
      {text:'Few-shot learning industrial (Int. J. Production Research 2024)',url:'https://www.tandfonline.com/doi/full/10.1080/00207543.2024.2316279',note:'5-shot supera 1-shot significativamente — define o mínimo de amostras no experimento.'},
      {text:'XDNet — meta-learning cross-domain (IEEE 2023)',url:'https://ieeexplore.ieee.org/document/10208767/',note:'Estado da arte em few-shot industrial. Abstract + problema motivador + resultados.'}
    ],
    T:[
      {text:'Revisar metodologia com justificativa técnica de hardware',note:'Por que Hikvision IP? Quais as limitações (latência RTSP, H.264) e como são mitigadas? Por que NVR?'},
      {text:'Pesquisa: compressão H.264 e impacto em detecção de objetos',note:'Quantificar perda de mAP com streams comprimidos vs câmeras industriais sem compressão. Fortifica seção de limitações.'}
    ],
    A:[
      {text:'Rascunho revisão bibliográfica: dados sintéticos e few-shot learning',note:'Eduardo fornece rascunho cru, Aline polirá.'},
      {text:'Revisão da coesão geral do documento',note:'Fio narrativo: problema → estado da arte → lacuna → proposta. Verificar se está claro em todas as seções.'}
    ]
  }},
  {n:10,month:3,title:'Datasets e contexto nacional',sub:'MVTec AD + trabalhos brasileiros + decisão final de dataset',
  sync:'Leitura cruzada: cada um lê a seção do outro e deixa comentários no Google Docs. Foco: o que está confuso, o que está faltando.',
  tasks:{
    E:[
      {text:'MVTec AD dataset (Int. J. Computer Vision 2021)',url:'https://link.springer.com/article/10.1007/s11263-020-01400-4',note:'Abstract + categorias + métricas. Benchmark padrão da área — precisa conhecer.'},
      {text:'Framework multicâmera com dataset próprio (SpringerOpen 2024)',url:'https://jivp-eurasipjournals.springeropen.com/articles/10.1186/s13640-024-00623-6',note:'Metodologia de criação de dataset — relevante pois o grupo vai criar o seu via NVR.'},
      {text:'Escrever rascunho das seções técnicas densas da revisão',note:'Deep learning, arquiteturas (YOLO/R-CNN), multicâmera, poucos dados. Rascunho cru — Aline polirá.'}
    ],
    T:[
      {text:'Decisão final sobre ferramenta de anotação',note:'Qual ferramenta o grupo vai usar para anotar os frames do NVR? Justificar na metodologia.'},
      {text:'Revisar toda a seção de metodologia proposta',note:'Verificar coerência técnica. O diagrama do sistema está correto e legível?'}
    ],
    A:[
      {text:'Integrar todos os rascunhos da revisão em versão coesa',note:'Garantir que as seções fluem naturalmente, sem repetições e com transições claras.'},
      {text:'Formatar referências (semanas 5–10) no Zotero em ABNT',note:'Verificar DOIs, nomes de journals, páginas em artigos de conferência.'}
    ]
  }},
  {n:11,month:3,title:'Integração e escrita final',sub:'Todas as seções se juntam em um documento coeso',
  sync:'Reunião mais longa da fase (1h). Leitura completa do documento em voz alta — ajuda a pegar inconsistências que a leitura silenciosa não pega.',
  tasks:{
    E:[
      {text:'Revisão técnica completa do documento',note:'Toda afirmação técnica está correta? Toda métrica tem fonte? As escolhas (YOLO, Hikvision, NVR, augmentation) estão bem justificadas?'},
      {text:'Escrever seção de objetivos gerais e específicos',note:'1 objetivo geral + 3–5 objetivos específicos com verbos de ação (desenvolver, avaliar, comparar, implementar).'}
    ],
    T:[
      {text:'Criar figuras e diagramas finais',note:'Diagrama do sistema em blocos, fluxo de processamento, posicionamento das câmeras. draw.io ou Figma — exportar em alta resolução.'},
      {text:'Revisar seção de metodologia — versão final',note:'Após esta semana a metodologia não deve mais mudar.'}
    ],
    A:[
      {text:'Integração final do documento',note:'Capa, sumário, listas de figuras e tabelas, numeração de páginas, espaçamento ABNT.'},
      {text:'Revisão de escrita completa',note:'Coesão entre seções, eliminação de jargão sem definição, clareza para a banca.'}
    ]
  }},
  {n:12,month:3,title:'Revisão final e entrega',sub:'Últimos ajustes e submissão',
  sync:'Revisão final conjunta. Submeter com pelo menos 1 dia de antecedência ao orientador.',
  tasks:{
    E:[
      {text:'Última revisão técnica de precisão',note:'Nomes de arquiteturas, siglas, métricas e citações nas seções técnicas.'},
      {text:'Verificar se a contribuição está clara',note:'O leitor consegue responder: o que esse trabalho fez que outros não fizeram? (low-cost + multicâmera + poucos dados)'}
    ],
    T:[
      {text:'Revisão final das figuras e diagramas',note:'Legenda, resolução, fonte citada se adaptado, tamanho de fonte visível.'},
      {text:'Testar todos os links das referências eletrônicas',note:'Links arXiv, MDPI, Springer — verificar se estão acessíveis e corretos.'}
    ],
    A:[
      {text:'Revisão ortográfica e gramatical final',note:'Corretor automático + leitura em voz alta para parágrafos densos.'},
      {text:'Exportar PDF final e verificar formatação',note:'Sumário com links funcionando, figuras não distorcidas, quebras de página corretas.'},
      {text:'Submissão ao orientador',note:'E-mail formal resumindo o que foi entregue e perguntando sobre próximos passos para a parte 2.'}
    ]
  }}
];

const monthNames={1:'mês 1 — fundamentos',2:'mês 2 — aprofundamento',3:'mês 3 — escrita e entrega'};
const STORAGE_KEY='tcc-plano-done-v1';
let filter='all',openWeek=1;
let done=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(done));}
function totalDone(){return Object.keys(done).filter(k=>done[k]&&k.endsWith('-all')).length;}
function personDone(pid){return Object.keys(done).filter(k=>done[k]&&k.endsWith('-'+pid)&&!k.endsWith('-all')).length;}
function personWeeks(pid){return weeks.filter(w=>w.tasks[pid]&&w.tasks[pid].length>0).length;}

function renderFilters(){
  const c=document.getElementById('filters');c.innerHTML='';
  [{id:'all',name:'todos',color:'#888780'},...Object.values(P)].forEach(p=>{
    const b=document.createElement('button');
    b.className='filter-btn'+(filter===p.id?' active':'');
    b.textContent=p.id==='all'?'todos':p.name+(p.role?' · '+p.role:'');
    if(filter===p.id){b.style.background=p.color;b.style.borderColor=p.color;}
    b.addEventListener('click',()=>{filter=p.id;render();});
    c.appendChild(b);
  });
}

function renderStats(){
  const c=document.getElementById('stats');c.innerHTML='';
  Object.values(P).forEach(p=>{
    const d=document.createElement('div');
    d.className='stat-card';
    d.style.background=p.id==='E'?'var(--purple-bg)':p.id==='T'?'var(--teal-bg)':'var(--coral-bg)';
    d.innerHTML=`<div class="stat-label" style="color:${p.color}">${p.name}</div><div class="stat-val" style="color:${p.color}">${personDone(p.id)} / ${personWeeks(p.id)}</div>`;
    c.appendChild(d);
  });
  const t=totalDone();
  document.getElementById('pct').textContent=Math.round(t/12*100)+'%';
  document.getElementById('pfill').style.width=Math.round(t/12*100)+'%';
}

function render(){
  renderFilters();renderStats();
  const c=document.getElementById('content');c.innerHTML='';
  let lastMonth=0;
  weeks.forEach(w=>{
    const vis=filter==='all'?Object.keys(P):[filter];
    if(!vis.some(p=>w.tasks[p]&&w.tasks[p].length))return;
    if(w.month!==lastMonth){
      const d=document.createElement('div');d.className='month-div';d.textContent=monthNames[w.month];c.appendChild(d);lastMonth=w.month;
    }
    const card=document.createElement('div');card.className='week-card';
    const isOpen=openWeek===w.n,allDone=done[w.n+'-all'];
    const hdr=document.createElement('div');hdr.className='week-hdr';
    hdr.innerHTML=`
      <div class="wnum" style="background:${allDone?'var(--teal-bg)':'var(--gray-bg)'};color:${allDone?'var(--teal)':'var(--gray)'}">${allDone?'&#10003;':w.n}</div>
      <div class="winfo">
        <div class="wtitle" style="${allDone?'text-decoration:line-through;opacity:.5':''}">${w.title}</div>
        <div class="wsub">${w.sub}</div>
      </div>
      <span class="chev ${isOpen?'open':''}">&#9654;</span>`;
    hdr.addEventListener('click',()=>{openWeek=openWeek===w.n?null:w.n;render();});
    card.appendChild(hdr);
    const body=document.createElement('div');body.className='wbody'+(isOpen?' open':'');
    vis.forEach(pid=>{
      const tasks=w.tasks[pid];if(!tasks||!tasks.length)return;
      const p=P[pid];
      const pb=document.createElement('div');pb.className='person-block';
      const ph=document.createElement('div');ph.className='person-hdr';
      ph.innerHTML=`<div class="person-dot" style="background:${p.color}"></div><span class="person-name" style="color:${p.color}">${p.name} <span style="font-weight:400;color:var(--text2)">— ${p.role}</span></span>`;
      pb.appendChild(ph);
      tasks.forEach(t=>{
        const row=document.createElement('div');row.className='task-row';
        const dash=document.createElement('div');dash.className='task-dash';dash.textContent='–';
        const tb=document.createElement('div');tb.className='task-body';
        if(t.url){tb.innerHTML=`<a class="task-link" href="${t.url}" target="_blank" rel="noopener">${t.text}</a>`;}
        else{const tm=document.createElement('div');tm.className='task-main';tm.textContent=t.text;tb.appendChild(tm);}
        if(t.note){const tn=document.createElement('div');tn.className='task-note';tn.textContent=t.note;tb.appendChild(tn);}
        row.appendChild(dash);row.appendChild(tb);pb.appendChild(row);
      });
      body.appendChild(pb);
    });
    if(w.sync){
      const sb=document.createElement('div');sb.className='sync-box';
      sb.innerHTML=`<div class="sync-label">reunião semanal</div><div class="sync-text">${w.sync}</div>`;
      body.appendChild(sb);
    }
    const dr=document.createElement('div');dr.className='done-row';
    Object.values(P).forEach(p=>{
      const k=w.n+'-'+p.id,on=done[k];
      const btn=document.createElement('button');
      btn.className='done-btn'+(on?' on':'');
      if(on){btn.style.borderColor=p.color;btn.style.color=p.color;btn.style.background=p.id==='E'?'var(--purple-bg)':p.id==='T'?'var(--teal-bg)':'var(--coral-bg)';}
      btn.innerHTML=`<div class="cb" style="border-color:${on?p.color:'currentColor'};background:${on?p.color:'transparent'}"></div> ${p.name}`;
      btn.addEventListener('click',()=>{
        done[k]=!done[k];
        done[w.n+'-all']=Object.values(P).every(pp=>done[w.n+'-'+pp.id]);
        save();render();
      });
      dr.appendChild(btn);
    });
    body.appendChild(dr);
    card.appendChild(body);c.appendChild(card);
  });
}
render();
</script>
